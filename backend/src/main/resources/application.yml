server:
  port: 8080

spring:
  application:
    name: enterprise-website-backend

  # H2 内存数据库配置
  datasource:
    url: jdbc:h2:mem:websitedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（开发用）
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # 初始化数据脚本
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      continue-on-error: true  # 允许重复INSERT时报错但不中断（解决重启后UNIQUE约束冲突问题）

# JWT 配置
jwt:
  secret: Y2xhdy1lbnRlcnByaXNlLXdlYnNpdGUtc2VjdXJldC1rZXktMjAyNA==  # Base64 编码的密钥
  expiration: 86400000  # 24小时（毫秒）

# 验证码配置
captcha:
  width: 120
  height: 40
  expire-seconds: 300  # 5分钟过期

logging:
  level:
    com.enterprise: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
